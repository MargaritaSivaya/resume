<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Резюме</title>
    <link rel="stylesheet" href="../normalize.css">
    <style>
        html {
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            min-width: 320px;
            font-size: 16px;
        }

        div {
            margin: 0 auto;
            max-width: 1630px;
            height: 100%;
            padding: 0 15px;
            -o-object-fit: contain;
            object-fit: contain;
        }

        img {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            margin: 0 auto;
            max-width: 70%;
            height: 100%;
        }

        @media (max-width: 600px) {
            img {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div>
        <img src="resume_page.jpg" alt="резюме">
    </div>
</body>


</html>
